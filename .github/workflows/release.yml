name: Build and Create Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when a tag starting with 'v' is pushed (e.g., v1.0.0)

jobs:
  build_and_release:
    name: Build Python Package and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build binary and source distributions
        run: python -m build

      - name: Generate Release and Attach Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/* # Uploads everything built in the dist/ folder to the release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
